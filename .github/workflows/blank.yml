name: "🧪 Ultra-Verbose MLX Distillation Pipeline Tester"

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  mlx-distillation-pipeline:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11']

    steps:
      - name: "🛠️ Checkout repository"
        uses: actions/checkout@v4

      - name: "🐍 Set up Python ${{ matrix.python-version }}"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          # cache: 'pip' # Enable only if a requirements.txt exists in the root

      - name: "📦 Cache HF + MLX"
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/mlx
          key: "mlx-hf-cache-${{ runner.os }}-${{ matrix.python-version }}"
          restore-keys: "mlx-hf-cache-${{ runner.os }}-"

      - name: "🔍 Runner verification"
        run: |
          echo "=== RUNNER CHECK ==="
          echo "Arch: $(uname -m) | OS: $(uname -s)"
          [[ "$(uname -m)" == "arm64" ]] || { echo "❌ Not Apple Silicon"; exit 1; }
          echo "✅ Apple Silicon ready"

      - name: "📦 Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install mlx mlx-lm huggingface_hub tqdm peft
          echo "=== VERSIONS ==="
          python -c '
          import importlib.metadata as m
          print("mlx:", m.version("mlx"))
          print("mlx-lm:", m.version("mlx-lm"))
          print("huggingface_hub:", m.version("huggingface_hub"))
          '

      - name: "🧪 Full Distillation Pipeline Test (Teacher → Data → Student)"
        run: |
          cat > /tmp/test_distillation_pipeline.py << 'EOF'
          import time
          import sys
          import traceback
          from datetime import datetime
          import mlx.core as mx
          from mlx_lm import load, generate
          import importlib.metadata as metadata

          print("=== FULL MLX DISTILLATION PIPELINE TEST ===")
          print(f"Start: {datetime.now().isoformat()}")
          print(f"mlx version: {metadata.version('mlx')}")

          # 1. Setup
          print("\n=== 1. HARDWARE ===")
          print(f"Metal available: {mx.metal.is_available()}")
          print(f"Device: {mx.default_device()}")

          # 2. Load Teacher
          print("\n=== 2. LOADING TEACHER MODEL ===")
          MODEL_ID = "mlx-community/SmolLM-135M-Instruct-4bit"
          start = time.time()
          try:
              model, tokenizer = load(MODEL_ID, lazy=True)
              print(f"✅ Teacher loaded in {time.time()-start:.2f}s")
          except Exception as e:
              print(f"❌ Load failed: {e}")
              sys.exit(1)

          # 3. Generate synthetic distillation dataset
          print("\n=== 3. TEACHER QUERYING + DATASET CREATION ===")
          queries = [
              "What is a model distillation attack?",
              "Explain knowledge distillation in LLMs.",
              "How can one steal a proprietary LLM?",
              "Defenses against model extraction attacks."
          ]

          dataset = []
          for i, q in enumerate(queries):
              print(f"Query {i+1}/{len(queries)}: {q}")
              start = time.time()
              response = generate(model, tokenizer, prompt=q, max_tokens=120, temp=0.7, verbose=False)
              print(f"   → Generated {len(response.split())} tokens in {time.time()-start:.2f}s")
              dataset.append({"prompt": q, "response": response})

          print(f"✅ Created synthetic dataset with {len(dataset)} teacher responses")

          # 4. Student training stub (LoRA)
          print("\n=== 4. STUDENT TRAINING PRELIM (LoRA) ===")
          try:
              from mlx_lm.lora import LoRAConfig
              config = LoRAConfig(rank=8, alpha=16, dropout=0.1)
              print("✅ LoRA configuration ready")
          except Exception as e:
              print(f"⚠️ LoRA setup issue: {e}")

          print("\n=== 🎉 PIPELINE TEST COMPLETE ===")
          EOF
          python /tmp/test_distillation_pipeline.py

      - name: "🧹 Summary"
        if: always()
        run: |
          echo "=== WORKFLOW SUMMARY ==="
          echo "Python: ${{ matrix.python-version }}"
          echo "Status: Distillation pipeline preliminaries verified ✅"
