name: "🧪 Ultra-Verbose MLX Distillation Pipeline Preliminaries Tester"

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  mlx-pipeline-prelims:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: "🛠️ Checkout repository"
        uses: actions/checkout@v4

      - name: "🐍 Set up Python ${{ matrix.python-version }}"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: "📦 Cache Hugging Face & MLX artifacts"
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/mlx
          key: "mlx-hf-cache-${{ runner.os }}-${{ matrix.python-version }}"
          restore-keys: "mlx-hf-cache-${{ runner.os }}-"

      - name: "🔍 Pre-flight: Runner hardware & OS verification"
        run: |
          echo "=== RUNNER ENVIRONMENT CHECK ==="
          echo "OS: $(uname -s)"
          echo "Architecture: $(uname -m)"
          if [[ "$(uname -m)" != "arm64" ]] || [[ "$(uname -s)" != "Darwin" ]]; then
            echo "❌ CRITICAL: This is NOT Apple Silicon macOS."
            exit 1
          fi
          echo "✅ Apple Silicon detected."

      - name: "📦 Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install mlx mlx-lm huggingface_hub tqdm

      - name: "🧪 Run MLX Test"
        run: |
          cat > /tmp/test_mlx.py << 'EOF'
          import mlx.core as mx
          print(f"Metal available: {mx.metal.is_available()}")
          EOF
          python /tmp/test_mlx.py

      - name: "🧹 Cleanup & summary"
        if: always()
        run: echo "Done."
