name: "🧪 Ultra-Verbose MLX Distillation Pipeline + QLoRA Student Training"

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  mlx-pipeline-prelims:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: "🛠️ Checkout repository"
        uses: actions/checkout@v4

      - name: "🐍 Set up Python ${{ matrix.python-version }}"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: "📦 Cache Hugging Face & MLX artifacts"
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/mlx
          key: "mlx-hf-cache-${{ runner.os }}-${{ matrix.python-version }}"
          restore-keys: "mlx-hf-cache-${{ runner.os }}-"

      - name: "🔍 Pre-flight: Runner hardware & OS verification"
        run: |
          echo "=== RUNNER ENVIRONMENT CHECK ==="
          echo "Date: $(date)"
          echo "OS: $(uname -s)"
          echo "Arch: $(uname -m)"
          if [[ "$(uname -m)" != "arm64" ]] || [[ "$(uname -s)" != "Darwin" ]]; then
            echo "❌ CRITICAL: Not Apple Silicon macOS"
            exit 1
          fi
          echo "✅ Apple Silicon confirmed"
          echo "=== END CHECK ==="

      - name: "📦 Install dependencies (mlx + mlx-lm + training extras)"
        run: |
          echo "=== PIP INSTALL ==="
          python -m pip install --upgrade pip setuptools wheel
          pip install mlx mlx-lm huggingface_hub tqdm
          # Training dependencies for QLoRA
          pip install "mlx-lm[train]"
          echo "=== VERSIONS ==="
          python -c '
          import importlib.metadata as metadata
          print("mlx version      :", metadata.version("mlx"))
          print("mlx-lm version   :", metadata.version("mlx-lm"))
          '
          echo "=== INSTALL COMPLETE ==="

      - name: "🧪 Run FULL distillation pipeline + QLoRA student training"
        run: |
          cat > /tmp/test_distillation_pipeline.py << 'EOF'
          import os
          import sys
          import time
          import json
          import traceback
          from datetime import datetime
          import importlib.metadata as metadata

          print("=== 🚀 FULL MLX DISTILLATION + QLoRA STUDENT TRAINING ===")
          print(f"Start: {datetime.now().isoformat()}")
          print(f"mlx-lm version: {metadata.version('mlx-lm')}")
          print("")

          # 1. HARDWARE
          print("=== 1. HARDWARE ===")
          import mlx.core as mx
          print(f"Metal available: {mx.metal.is_available()}")
          print(f"Device: {mx.default_device()}")
          print("")

          # 2. IMPORTS
          print("=== 2. IMPORTS ===")
          from mlx_lm import load, generate
          from mlx_lm.sample_utils import make_sampler
          print("✅ mlx_lm loaded")
          print("✅ make_sampler imported")
          print("")

          # 3. LOAD TEACHER
          print("=== 3. LOADING TEACHER MODEL ===")
          MODEL_ID = "mlx-community/SmolLM-135M-Instruct-4bit"
          start = time.time()
          model, tokenizer = load(MODEL_ID, lazy=True)
          print(f"✅ Teacher loaded in {time.time() - start:.2f}s")
          print("")

          # 4. TEACHER QUERYING + DATASET CREATION
          print("=== 4. TEACHER QUERYING + DATASET CREATION ===")
          queries = [
              "What is a model distillation attack in the context of proprietary LLMs?",
              "How can an adversary use knowledge distillation for black-box model extraction?",
              "What are promising defenses against large-scale LLM distillation attacks?",
              "Design a query-efficient strategy to distill reasoning capabilities from a frontier model."
          ]

          dataset = []
          sampler = make_sampler(temp=0.7, top_p=0.9)

          for i, q in enumerate(queries, 1):
              print(f"Query {i}/{len(queries)}: {q}")
              start = time.time()
              response = generate(model, tokenizer, prompt=q, max_tokens=120, sampler=sampler, verbose=False)
              print(f"   ✅ Generated in {time.time() - start:.2f}s")
              dataset.append({"prompt": q, "response": response})

          print(f"✅ Dataset ready with {len(dataset)} examples")
          print("")

          # 5. CREATE TRAINING DATA FOR QLoRA
          print("=== 5. PREPARING QLoRA TRAINING DATA ===")
          os.makedirs("/tmp/train_data", exist_ok=True)
          train_file = "/tmp/train_data/train.jsonl"

          with open(train_file, "w") as f:
              for item in dataset:
                  text = f"<|im_start|>user\n{item['prompt']}<|im_end|>\n<|im_start|>assistant\n{item['response']}<|im_end|>"
                  f.write(json.dumps({"text": text}) + "\n")

          print(f"✅ Training data saved to {train_file}")
          print("")

          # 6. QLoRA FINE-TUNING
          print("=== 6. QLoRA STUDENT TRAINING ===")
          print("Starting short QLoRA fine-tuning (low iters for CI speed)...")
          try:
              import subprocess
              cmd = [
                  "python", "-m", "mlx_lm.lora",
                  "--model", MODEL_ID,
                  "--train",
                  "--data", "/tmp/train_data",
                  "--iters", "50",
                  "--batch-size", "1",
                  "--learning-rate", "1e-5",
                  "--lora-layers", "8",
                  "--rank", "8",
                  "--steps-per-report", "20",
                  "--output", "/tmp/qlora_adapter"
              ]
              result = subprocess.run(cmd, capture_output=True, text=True, timeout=300)
              print(result.stdout)
              if result.returncode != 0:
                  print("Training stderr:", result.stderr)
                  raise Exception("QLoRA training failed")
              print("✅ QLoRA training completed successfully")
          except Exception as e:
              print(f"⚠️ QLoRA training step failed: {type(e).__name__}")
              traceback.print_exc()

          print("")

          # 7. TEST THE FINE-TUNED STUDENT
          print("=== 7. TESTING FINE-TUNED STUDENT ===")
          try:
              student_model, student_tokenizer = load("/tmp/qlora_adapter", lazy=True)
              test_prompt = "Summarize the main idea of model distillation attacks."
              sampler_test = make_sampler(temp=0.6, top_p=0.95)
              response = generate(student_model, student_tokenizer, prompt=test_prompt, max_tokens=80, sampler=sampler_test, verbose=False)
              print(f"✅ Student response to test prompt:\n{response}")
          except Exception as e:
              print(f"⚠️ Student inference test failed: {type(e).__name__}")

          print("")
          print("=== 8. SUMMARY ===")
          print("🎉 Pipeline with QLoRA student training completed!")
          EOF

          python /tmp/test_distillation_pipeline.py

      - name: "🧹 Cleanup & final summary"
        if: always()
        run: |
          echo "=== WORKFLOW SUMMARY ==="
          echo "Python version: ${{ matrix.python-version }}"
          echo "Runner: macOS Apple Silicon"
          echo "✅ Full distillation pipeline + QLoRA student training tested."
