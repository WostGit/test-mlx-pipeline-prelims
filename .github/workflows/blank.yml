name: "🧪 Ultra-Verbose MLX Distillation Pipeline Preliminaries Tester"

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  mlx-pipeline-prelims:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: "🛠️ Checkout repository"
        uses: actions/checkout@v4

      - name: "🐍 Set up Python ${{ matrix.python-version }}"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: "📦 Cache Hugging Face & MLX artifacts"
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/mlx
          key: "mlx-hf-cache-${{ runner.os }}-${{ matrix.python-version }}"
          restore-keys: "mlx-hf-cache-${{ runner.os }}-"

      - name: "🔍 Pre-flight: Runner hardware & OS verification"
        run: |
          echo "=== RUNNER ENVIRONMENT CHECK ==="
          echo "Date: $(date)"
          echo "OS: $(uname -s)"
          echo "Arch: $(uname -m)"
          if [[ "$(uname -m)" != "arm64" ]] || [[ "$(uname -s)" != "Darwin" ]]; then
            echo "❌ CRITICAL: Not Apple Silicon macOS"
            exit 1
          fi
          echo "✅ Apple Silicon confirmed"
          echo "=== END CHECK ==="

      - name: "📦 Install dependencies (mlx + mlx-lm + helpers)"
        run: |
          echo "=== PIP INSTALL ==="
          python -m pip install --upgrade pip setuptools wheel
          pip install mlx mlx-lm huggingface_hub tqdm
          echo "=== VERSIONS ==="
          python -c '
          import importlib.metadata as metadata
          print("mlx version      :", metadata.version("mlx"))
          print("mlx-lm version   :", metadata.version("mlx-lm"))
          print("huggingface_hub  :", metadata.version("huggingface_hub"))
          '
          echo "=== INSTALL COMPLETE ==="

      - name: "🧪 Run FULL ultra-verbose distillation pipeline test"
        run: |
          cat > /tmp/test_distillation_pipeline.py << 'EOF'
          import os
          import sys
          import time
          import traceback
          from datetime import datetime
          import importlib.metadata as metadata

          print("=== 🚀 FULL MLX DISTILLATION PIPELINE TEST (mlx-lm 0.31.x) ===")
          print(f"Start: {datetime.now().isoformat()}")
          print(f"Python: {sys.version}")
          print(f"mlx version: {metadata.version('mlx')}")
          print(f"mlx-lm version: {metadata.version('mlx-lm')}")
          print("")

          # 1. HARDWARE
          print("=== 1. HARDWARE ===")
          import mlx.core as mx
          print(f"Metal available: {mx.metal.is_available()}")
          print(f"Device: {mx.default_device()}")
          print("")

          # 2. IMPORTS
          print("=== 2. IMPORTS ===")
          from mlx_lm import load, generate
          from mlx_lm.sample_utils import make_sampler
          print("✅ mlx_lm loaded")
          print("✅ make_sampler imported (for temperature / top_p control)")
          print("")

          # 3. LOAD TEACHER
          print("=== 3. LOADING TEACHER MODEL ===")
          MODEL_ID = "mlx-community/SmolLM-135M-Instruct-4bit"
          start = time.time()
          model, tokenizer = load(MODEL_ID, lazy=True)
          print(f"✅ Teacher loaded in {time.time() - start:.2f}s")
          print("")

          # 4. TEACHER QUERYING + DATASET
          print("=== 4. TEACHER QUERYING + DATASET CREATION ===")
          queries = [
              "What is a model distillation attack in the context of proprietary LLMs?",
              "How can an adversary use knowledge distillation for black-box model extraction?",
              "What are promising defenses against large-scale LLM distillation attacks?",
              "Design a query-efficient strategy to distill reasoning capabilities from a frontier model."
          ]

          dataset = []
          sampler = make_sampler(temp=0.7, top_p=0.9)

          for i, q in enumerate(queries, 1):
              print(f"Query {i}/{len(queries)}: {q}")
              start = time.time()
              response = generate(
                  model, tokenizer,
                  prompt=q,
                  max_tokens=120,
                  sampler=sampler,
                  verbose=False
              )
              gen_time = time.time() - start
              print(f"   ✅ Generated in {gen_time:.2f}s")
              print(f"   Sample: {response[:280]}...\n")
              dataset.append({"prompt": q, "response": response})

          print(f"✅ Synthetic dataset ready with {len(dataset)} teacher examples")
          print("")

          # 5. EDGE CASES
          print("=== 5. EDGE CASES (expected failures documented) ===")
          edge_cases = [
              ("Empty prompt", ""),
              ("Zero max_tokens", "Test prompt", 0),
              ("High temperature", "Test prompt", 128, 1.5),
              ("Low temperature", "Test prompt", 64, 0.1),
          ]

          for name, prompt, *args in edge_cases:
              max_t = args[0] if args else 10
              temp_val = args[1] if len(args) > 1 else 0.7
              try:
                  sampler_edge = make_sampler(temp=temp_val, top_p=0.95)
                  _ = generate(model, tokenizer, prompt=prompt, max_tokens=max_t, sampler=sampler_edge, verbose=False)
                  print(f"✅ {name} succeeded")
              except Exception as e:
                  print(f"⚠️ {name} raised {type(e).__name__}")
          print("")

          # 6. SUMMARY
          print("=== 6. DISTILLATION PIPELINE SUMMARY ===")
          print("🎉 ALL CORE PRELIMINARIES PASSED")
          EOF

          python /tmp/test_distillation_pipeline.py

      - name: "🧹 Cleanup & final summary"
        if: always()
        run: |
          echo "=== WORKFLOW SUMMARY ==="
          echo "Python version: ${{ matrix.python-version }}"
          echo "Runner: macOS Apple Silicon"
          echo "✅ MLX distillation pipeline foundation is solid."
