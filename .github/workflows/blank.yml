name: "🧪 Ultra-Verbose MLX Distillation Pipeline Preliminaries Tester"

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  mlx-pipeline-prelims:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: "🛠️ Checkout repository"
        uses: actions/checkout@v4

      - name: "🐍 Set up Python ${{ matrix.python-version }}"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          # Removed automatic 'cache' to avoid errors if requirements.txt is missing

      - name: "📦 Cache Hugging Face & MLX artifacts"
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/mlx
          key: "mlx-hf-cache-${{ runner.os }}-${{ matrix.python-version }}"
          restore-keys: "mlx-hf-cache-${{ runner.os }}-"

      - name: "🔍 Pre-flight: Runner hardware & OS verification"
        run: |
          echo "=== RUNNER ENVIRONMENT CHECK ==="
          echo "Date: $(date)"
          echo "OS: $(uname -s)"
          echo "Arch: $(uname -m)"
          if [[ "$(uname -m)" != "arm64" ]] || [[ "$(uname -s)" != "Darwin" ]]; then
            echo "❌ CRITICAL: Not Apple Silicon macOS → MLX will fail"
            exit 1
          fi
          echo "✅ Apple Silicon (arm64) confirmed"
          echo "=== END CHECK ==="

      - name: "📦 Install dependencies (mlx + mlx-lm + helpers)"
        run: |
          echo "=== PIP INSTALL ==="
          python -m pip install --upgrade pip setuptools wheel
          pip install mlx mlx-lm huggingface_hub tqdm
          echo "=== VERSIONS ==="
          python -c '
          import importlib.metadata as metadata
          for pkg in ["mlx", "mlx-lm", "huggingface_hub", "numpy"]:
              try:
                  print(f"{pkg:15}: {metadata.version(pkg)}")
              except:
                  print(f"{pkg:15}: NOT INSTALLED")
          '
          echo "=== INSTALL COMPLETE ==="

      - name: "🧪 Run FULL ultra-verbose distillation pipeline test"
        run: |
          cat > /tmp/test_distillation_pipeline.py << 'EOF'
          import os
          import sys
          import time
          import traceback
          from datetime import datetime
          import importlib.metadata as metadata

          print("=== 🚀 FULL MLX DISTILLATION PIPELINE TEST (mlx-lm 0.31.x) ===")
          print(f"Start: {datetime.now().isoformat()}")
          print(f"Python: {sys.version}")
          
          # 1. HARDWARE
          print("=== 1. HARDWARE ===")
          try:
              import mlx.core as mx
              print(f"Metal available: {mx.metal.is_available()}")
              print(f"Device: {mx.default_device()}")
          except Exception:
              print("❌ Hardware check failed")
              traceback.print_exc()
              sys.exit(1)

          # 2. IMPORTS
          print("\n=== 2. IMPORTS ===")
          try:
              from mlx_lm import load, generate
              from mlx_lm.sample_utils import make_sampler
              print("✅ mlx_lm and make_sampler imported")
          except Exception:
              print("❌ Import failed")
              traceback.print_exc()
              sys.exit(1)

          # 3. LOAD TEACHER MODEL
          print("\n=== 3. LOADING TEACHER MODEL ===")
          MODEL_ID = "mlx-community/SmolLM-135M-Instruct-4bit"
          try:
              start = time.time()
              model, tokenizer = load(MODEL_ID, lazy=True)
              print(f"✅ Teacher loaded in {time.time() - start:.2f}s")
          except Exception:
              print("❌ Model loading failed")
              traceback.print_exc()
              sys.exit(1)

          # 4. TEACHER QUERYING + DATASET CREATION
          print("\n=== 4. TEACHER QUERYING + DATASET CREATION ===")
          queries = [
              "What is a model distillation attack?",
              "Explain knowledge distillation in model extraction attacks.",
              "Defenses against LLM distillation?",
              "Describe a query-efficient black-box distillation pipeline."
          ]
          dataset = []
          sampler = make_sampler(temp=0.7, top_p=0.9)
          for i, q in enumerate(queries, 1):
              print(f"Query {i}/{len(queries)}: {q}")
              try:
                  start = time.time()
                  response = generate(model, tokenizer, prompt=q, max_tokens=120, sampler=sampler, verbose=False)
                  print(f"   ✅ Response generated in {time.time() - start:.2f}s")
                  dataset.append({"prompt": q, "response": response})
              except Exception:
                  print(f"   ❌ Query failed")

          # 5. EDGE CASES
          print("\n=== 5. EDGE CASES ===")
          edge_cases = [("Empty prompt", ""), ("Zero max_tokens", "Test", 0)]
          for name, prompt, *args in edge_cases:
              try:
                  m_tokens = args[0] if args else 10
                  _ = generate(model, tokenizer, prompt=prompt, max_tokens=m_tokens, verbose=False)
                  print(f"✅ {name} handled")
              except Exception:
                  print(f"⚠️ {name} raised exception")

          print("\n=== 🎉 ALL PRELIMINARIES PASSED ===")
          EOF
          python /tmp/test_distillation_pipeline.py

      - name: "🧹 Cleanup & final summary"
        if: always()
        run: |
          echo "=== WORKFLOW SUMMARY ==="
          echo "Python version: ${{ matrix.python-version }}"
          echo "Runner: macOS Apple Silicon"
          echo "✅ MLX distillation pipeline foundation is solid."
