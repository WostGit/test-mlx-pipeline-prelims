name: "🧪 Ultra-Verbose MLX Distillation Pipeline Preliminaries Tester"

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  mlx-pipeline-prelims:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: "🛠️ Checkout repository"
        uses: actions/checkout@v4

      - name: "🐍 Set up Python ${{ matrix.python-version }}"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          # Removed automatic 'cache' to prevent errors if requirements.txt is missing

      - name: "📦 Cache Hugging Face & MLX artifacts"
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/mlx
          key: "mlx-hf-cache-${{ runner.os }}-${{ matrix.python-version }}"
          restore-keys: "mlx-hf-cache-${{ runner.os }}-"

      - name: "🔍 Pre-flight: Runner hardware & OS verification"
        run: |
          echo "=== RUNNER ENVIRONMENT CHECK ==="
          echo "Date: $(date)"
          echo "OS: $(uname -s)"
          echo "Arch: $(uname -m)"
          if [[ "$(uname -m)" != "arm64" ]] || [[ "$(uname -s)" != "Darwin" ]]; then
            echo "❌ CRITICAL: Not Apple Silicon macOS"
            exit 1
          fi
          echo "✅ Apple Silicon confirmed"
          echo "=== END CHECK ==="

      - name: "📦 Install dependencies (mlx + mlx-lm + helpers)"
        run: |
          echo "=== PIP INSTALL ==="
          python -m pip install --upgrade pip setuptools wheel
          pip install mlx mlx-lm huggingface_hub tqdm
          echo "=== VERSIONS ==="
          python -c '
          import importlib.metadata as metadata
          print("mlx version          :", metadata.version("mlx"))
          print("mlx-lm version       :", metadata.version("mlx-lm"))
          print("huggingface_hub      :", metadata.version("huggingface_hub"))
          '
          echo "=== INSTALL COMPLETE ==="

      - name: "🧪 Run FULL ultra-verbose distillation preliminaries test"
        run: |
          cat > /tmp/test_mlx_distillation_prelims.py << 'EOF'
          import os
          import sys
          import time
          import traceback
          from datetime import datetime
          import importlib.metadata as metadata

          print("=== 🚀 MLX DISTILLATION PIPELINE PRELIMINARIES TEST (FULL) ===")
          print(f"Start: {datetime.now().isoformat()}")
          print(f"Python: {sys.version}")
          print(f"mlx version: {metadata.version('mlx')}")
          print("")

          # 1. MLX Core + Metal
          print("=== 1. MLX CORE + METAL ===")
          try:
              import mlx.core as mx
              print("✅ mlx.core imported")
              metal_ok = mx.metal.is_available()
              print(f"Metal available: {metal_ok}")
              if metal_ok:
                  print("✅ Metal GPU ready for teacher inference & student training")
                  print("Device:", mx.default_device())
              else:
                  print("❌ Metal unavailable")
                  sys.exit(1)
          except Exception as e:
              print("❌ MLX core failed")
              traceback.print_exc()
              sys.exit(1)

          # 2. mlx-lm imports
          print("=== 2. MLX-LM IMPORTS ===")
          try:
              from mlx_lm import load, generate
              print("✅ mlx_lm loaded")
          except Exception as e:
              print("❌ mlx_lm import failed")
              traceback.print_exc()
              sys.exit(1)

          # 3. Model loading
          print("=== 3. MODEL LOADING ===")
          MODEL_ID = "mlx-community/SmolLM-135M-Instruct-4bit"
          try:
              start = time.time()
              model, tokenizer = load(MODEL_ID, lazy=True)
              print(f"✅ Model {MODEL_ID} loaded in {time.time() - start:.2f}s")
          except Exception as e:
              print("❌ Model load failed")
              traceback.print_exc()
              sys.exit(1)

          # 4. Inference + Edge Cases
          print("=== 4. INFERENCE + EDGE CASES ===")
          prompt = "Explain LLM model distillation attacks in one sentence."
          try:
              output = generate(model, tokenizer, prompt=prompt, max_tokens=60, verbose=True)
              print(f"✅ Normal generate() OK")
          except Exception as e:
              print("❌ Normal generate failed")

          # 5. Distillation simulation
          print("=== 5. DISTILLATION PRELIM SIMULATION ===")
          queries = ["What is a model extraction attack?", "How to defend against distillation?"]
          for q in queries:
              resp = generate(model, tokenizer, prompt=q, max_tokens=50, verbose=False)
              print(f"Query: {q}\n→ {resp[:100]}...\n")

          print("=== 🎉 ALL PRELIMINARIES PASSED ===")
          EOF
          python /tmp/test_mlx_distillation_prelims.py

      - name: "🧹 Cleanup & final summary"
        if: always()
        run: |
          echo "=== WORKFLOW SUMMARY ==="
          echo "Python: ${{ matrix.python-version }}"
          echo "Status: All core distillation preliminaries verified ✅"
